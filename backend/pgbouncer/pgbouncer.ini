; ═══════════════════════════════════════════════════════════
; PgBouncer — Connection Pooling for AION Vision Hub
; Transaction pooling mode for high-concurrency workloads
; ═══════════════════════════════════════════════════════════

[databases]
; Connect to the upstream PostgreSQL instance
; In Docker Compose, "postgres" resolves to the postgres service
aion_vision_hub = host=postgres port=5432 dbname=aion_vision_hub

[pgbouncer]
; ── Pooling Mode ──
; transaction: connections are returned to pool after each transaction
; This is the recommended mode for most applications
pool_mode = transaction

; ── Connection Limits ──
max_client_conn = 400
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
max_db_connections = 100

; ── Timeouts ──
server_idle_timeout = 300
server_connect_timeout = 15
server_login_retry = 3
query_timeout = 0
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60

; ── Reserve Pool ──
; Activate reserve pool connections after this many seconds of waiting
reserve_pool_timeout = 5

; ── Logging ──
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; ── Network ──
listen_addr = 0.0.0.0
listen_port = 6432

; ── Authentication ──
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ── Admin Console ──
admin_users = aion
stats_users = aion

; ── TLS (disabled inside Docker network) ──
; client_tls_sslmode = disable
; server_tls_sslmode = disable

; ── Misc ──
ignore_startup_parameters = extra_float_digits
application_name_add_host = 1
