# ═══════════════════════════════════════════════════════════
# Redis Sentinel — High Availability for AION Vision Hub
# Requires 3 sentinel nodes minimum for proper quorum
# ═══════════════════════════════════════════════════════════

# Port for this sentinel instance
port 26379

# ── Monitor Configuration ──
# sentinel monitor <master-name> <ip> <port> <quorum>
# quorum: number of sentinels that must agree the master is down
sentinel monitor aion-redis-master redis-master 6379 2

# ── Failure Detection ──
# Time in ms before a master is considered down (subjectively)
sentinel down-after-milliseconds aion-redis-master 5000

# ── Failover Configuration ──
# Timeout in ms for the entire failover process
sentinel failover-timeout aion-redis-master 10000

# Number of replicas that can be reconfigured simultaneously during failover
# Keep low to ensure at least some replicas remain available during failover
sentinel parallel-syncs aion-redis-master 1

# ── Authentication (uncomment if redis requires a password) ──
# sentinel auth-pass aion-redis-master YOUR_REDIS_PASSWORD

# ── Notifications (optional) ──
# sentinel notification-script aion-redis-master /opt/aion/scripts/sentinel-notify.sh
# sentinel client-reconfig-script aion-redis-master /opt/aion/scripts/sentinel-reconfig.sh

# ── Logging ──
loglevel notice
logfile ""
