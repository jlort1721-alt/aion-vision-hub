# ═══════════════════════════════════════════════════════════
# Redis — Production Configuration for AION Vision Hub
# Optimized for caching + session store workload
# ═══════════════════════════════════════════════════════════

# ── Network ──
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
tcp-keepalive 300
timeout 0

# ── Memory Management ──
maxmemory 512mb
maxmemory-policy allkeys-lru

# Eviction sampling — higher = more accurate but slower
maxmemory-samples 10

# ── Persistence: AOF (Append Only File) ──
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ── Persistence: RDB Snapshots ──
save 900 1
save 300 10
save 60 10000

dbfilename dump.rdb
dir /data

rdbcompression yes
rdbchecksum yes
stop-writes-on-bgsave-error yes

# ── Logging ──
loglevel notice
logfile ""

# ── Slow Log ──
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Clients ──
maxclients 10000

# ── Latency Monitoring ──
latency-monitor-threshold 100

# ── Dangerous Commands (rename in production) ──
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""

# ── Replication (enable when adding replicas) ──
# replicaof redis-master 6379
# replica-serve-stale-data yes
# replica-read-only yes
