version: "3.9"

# ═══════════════════════════════════════════════════════════
# AION Vision Hub — Production Docker Compose
# Optimized for 250-1000 devices
# ═══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 16 (Production) ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aion_vision_hub
      POSTGRES_USER: aion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /opt/aion/backups:/backups
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "log_temp_files=0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aion -d aion_vision_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aion-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 1g

  # ── PgBouncer (Connection Pooling) ──
  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aion-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
        reservations:
          memory: 32m

  # ── Backend API (Production) ──
  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    environment:
      PORT: 3000
      HOST: "0.0.0.0"
      NODE_ENV: production
      DATABASE_URL: postgres://aion:${POSTGRES_PASSWORD}@pgbouncer:6432/aion_vision_hub
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: aion-vision-hub
      JWT_EXPIRATION: "24h"
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_WINDOW_MS: "60000"
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      # AI Providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # ElevenLabs
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_DEFAULT_VOICE_ID: ${ELEVENLABS_DEFAULT_VOICE_ID:-}
      ELEVENLABS_MODEL_ID: ${ELEVENLABS_MODEL_ID:-eleven_multilingual_v2}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-AION Vision Hub}
      # WhatsApp
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      # eWeLink
      EWELINK_APP_ID: ${EWELINK_APP_ID:-}
      EWELINK_APP_SECRET: ${EWELINK_APP_SECRET:-}
      EWELINK_REGION: ${EWELINK_REGION:-us}
      # SIP
      SIP_HOST: ${SIP_HOST:-}
      SIP_PORT: ${SIP_PORT:-5060}
      SIP_TRANSPORT: ${SIP_TRANSPORT:-udp}
      SIP_ARI_URL: ${SIP_ARI_URL:-}
      SIP_ARI_USERNAME: ${SIP_ARI_USERNAME:-}
      SIP_ARI_PASSWORD: ${SIP_ARI_PASSWORD:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - aion-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 256m

  # ── Edge Gateway (Production) ──
  edge-gateway:
    build:
      context: .
      dockerfile: apps/edge-gateway/Dockerfile
    environment:
      PORT: 3100
      HOST: "0.0.0.0"
      NODE_ENV: production
      GATEWAY_ID: ${GATEWAY_ID:-gw-prod-01}
      SITE_ID: ${SITE_ID:-}
      BACKEND_API_URL: http://backend-api:3000
      BACKEND_API_KEY: ${BACKEND_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_RTSP_PORT: 8554
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      # Optimized for 250-1000 devices
      DEVICE_CONNECT_TIMEOUT_MS: "10000"
      DEVICE_PING_INTERVAL_MS: "60000"
      DEVICE_RECONNECT_MAX_ATTEMPTS: "10"
      DEVICE_RECONNECT_BASE_DELAY_MS: "3000"
      DISCOVERY_TIMEOUT_MS: "15000"
      DISCOVERY_NETWORK_RANGE: ${DISCOVERY_NETWORK_RANGE:-192.168.1.0/24}
      CACHE_MAX_ENTRIES: "2000"
      CACHE_TTL_MS: "600000"
      HEARTBEAT_INTERVAL_MS: "60000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3100:3100"
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aion-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 128m

  # ── MediaMTX (RTSP → WebRTC/HLS proxy) — Production ──
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "127.0.0.1:9997:9997"   # API (internal only)
    environment:
      MTX_PROTOCOLS: tcp
      MTX_WEBRTCADDRESS: ":8889"
      MTX_API: "yes"
      MTX_APIADDRESS: ":9997"
      MTX_READTIMEOUT: "20s"
      MTX_WRITETIMEOUT: "20s"
      MTX_READBUFFERCOUNT: "2048"
      MTX_METRICS: "yes"
      MTX_METRICSADDRESS: ":9998"
    networks:
      - aion-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
        reservations:
          memory: 256m

volumes:
  pgdata:
    driver: local

networks:
  aion-net:
    driver: bridge
