# ═══════════════════════════════════════════════════════════════════
# AION Vision Hub — Grafana Dashboard Provisioning
# ═══════════════════════════════════════════════════════════════════

apiVersion: 1

providers:
  - name: "AION Vision Hub"
    orgId: 1
    folder: "AION"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
