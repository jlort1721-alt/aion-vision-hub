# ═══════════════════════════════════════════════════════════════════
# AION Vision Hub — Grafana Datasource Provisioning
# ═══════════════════════════════════════════════════════════════════

apiVersion: 1

datasources:
  # ── Prometheus — Metrics ──
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  # ── Loki — Logs ──
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: '"request_id":"([^"]+)"'
          name: RequestID
          url: ""
