# ═══════════════════════════════════════════════════════════════════
# AION Vision Hub — Prometheus Alerting Rules
# ═══════════════════════════════════════════════════════════════════

groups:
  # ── Service Health ──────────────────────────────────────────────
  - name: service_health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been unreachable for more than 2 minutes."
          runbook_url: "https://wiki.internal/runbooks/service-down"

      - alert: ServiceHighRestartRate
        expr: changes(process_start_time_seconds[1h]) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.job }} is restarting frequently"
          description: "{{ $labels.job }} has restarted more than 3 times in the last hour."

  # ── HTTP Error Rate ─────────────────────────────────────────────
  - name: http_errors
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(aion_http_requests_total{status_code=~"5.."}[5m])) by (service)
            /
            sum(rate(aion_http_requests_total[5m])) by (service)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "More than 5% of requests are returning 5xx status codes on {{ $labels.service }} over the last 5 minutes. Current rate: {{ $value | humanizePercentage }}"

      - alert: ElevatedClientErrors
        expr: |
          (
            sum(rate(aion_http_requests_total{status_code=~"4.."}[5m])) by (service)
            /
            sum(rate(aion_http_requests_total[5m])) by (service)
          ) > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 4xx error rate on {{ $labels.service }}"
          description: "More than 25% of requests are returning 4xx status codes. Current rate: {{ $value | humanizePercentage }}"

  # ── Latency ─────────────────────────────────────────────────────
  - name: latency
    interval: 30s
    rules:
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(aion_http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "95th percentile request latency exceeds 2 seconds on {{ $labels.service }}. Current p95: {{ $value | humanizeDuration }}"

      - alert: ElevatedLatency
        expr: |
          histogram_quantile(0.95, sum(rate(aion_http_request_duration_seconds_bucket[5m])) by (le, service)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated p95 latency on {{ $labels.service }}"
          description: "95th percentile request latency exceeds 1 second. Current p95: {{ $value | humanizeDuration }}"

  # ── Infrastructure ──────────────────────────────────────────────
  - name: infrastructure
    interval: 60s
    rules:
      - alert: DiskSpaceWarning
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space running low on {{ $labels.instance }}"
          description: "Less than 15% disk space remaining on {{ $labels.instance }} ({{ $labels.mountpoint }}). Available: {{ $value | humanizePercentage }}"

      - alert: DiskSpaceCritical
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critically low on {{ $labels.instance }}"
          description: "Less than 5% disk space remaining. Immediate action required."

      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90%. Current: {{ $value | humanizePercentage }}"

      - alert: HighCPUUsage
        expr: |
          (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% for more than 10 minutes."

  # ── SSL Certificates ───────────────────────────────────────────
  - name: ssl
    interval: 3600s
    rules:
      - alert: SSLExpiringSoon
        expr: |
          probe_ssl_earliest_cert_expiry - time() < 86400 * 14
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon for {{ $labels.instance }}"
          description: "SSL certificate expires in less than 14 days. Expiry: {{ $value | humanizeDuration }} remaining."

      - alert: SSLExpiryCritical
        expr: |
          probe_ssl_earliest_cert_expiry - time() < 86400 * 3
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "SSL certificate expiring in less than 3 days for {{ $labels.instance }}"
          description: "Immediate certificate renewal required."

  # ── Device Monitoring ───────────────────────────────────────────
  - name: devices
    interval: 60s
    rules:
      - alert: DeviceOffline
        expr: |
          aion_device_status{status="offline"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Device {{ $labels.device_id }} offline"
          description: "Device {{ $labels.device_id }} ({{ $labels.device_name }}) has been offline for more than 10 minutes."

      - alert: HighDeviceOfflineRate
        expr: |
          (
            count(aion_device_status{status="offline"})
            /
            count(aion_device_status)
          ) > 0.20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High percentage of devices offline"
          description: "More than 20% of devices are offline. This may indicate a network issue."

  # ── Database ────────────────────────────────────────────────────
  - name: database
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          pg_stat_activity_count > 180
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "Active database connections ({{ $value }}) are approaching the max_connections limit of 200. Immediate investigation required."

      - alert: DatabaseConnectionPoolHigh
        expr: |
          pg_stat_activity_count > 150
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool usage is high"
          description: "Active database connections ({{ $value }}) are above 150/200. Consider scaling or investigating connection leaks."

      - alert: DatabaseSlowQueries
        expr: |
          rate(pg_stat_activity_max_tx_duration{state="active"}[5m]) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "Long-running database queries detected. Max transaction duration exceeds 30 seconds."

  # ── Redis ───────────────────────────────────────────────────────
  - name: redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: aion_redis_connected == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis connection lost"
          description: "Backend API has lost connection to Redis for more than 2 minutes. Caching and pub/sub are degraded."

  # ── WebSocket ───────────────────────────────────────────────────
  - name: websocket
    interval: 30s
    rules:
      - alert: WebSocketConnectionSpike
        expr: |
          aion_ws_connections_active > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of WebSocket connections"
          description: "Active WebSocket connections ({{ $value }}) are unusually high. Monitor for resource exhaustion."

  # ── Performance & Reliability ──────────────────────────────
  - name: performance
    interval: 30s
    rules:
      - alert: LatencyP95Above500ms
        expr: histogram_quantile(0.95, rate(aion_http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API latency p95 above 500ms"

      - alert: MemoryUsageAbove85
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 85%"

      - alert: SlowDatabaseQuery
        expr: histogram_quantile(0.95, rate(aion_db_query_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database query p95 above 1 second"

      - alert: StaleBackup
        expr: time() - aion_backup_last_success_timestamp > 90000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No successful backup in 25 hours"

      - alert: ElevatedWorkerErrors
        expr: rate(aion_worker_errors_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker errors elevated"
