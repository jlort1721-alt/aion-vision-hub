# ──────────────────────────────────────────────────────────────
# Clave Seguridad — NGINX Reverse Proxy
# ──────────────────────────────────────────────────────────────
# HTTP server (redirects to HTTPS in production)
# For TLS: uncomment the ssl server block below and provide certs.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # In production with TLS, uncomment this to force HTTPS:
    # return 301 https://$host$request_uri;

    server_tokens off;
    client_max_body_size 16m;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # VMS platform requires camera and microphone for intercom/live-view
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── SPA Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ─────────────────────────────────────────────
    location /api {
        proxy_pass http://clave-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket Proxy ───────────────────────────────────────
    location /ws {
        proxy_pass http://clave-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── MediaMTX WebRTC Proxy (optional, for single-domain setup) ─
    # Uncomment if MediaMTX should be accessed via same domain:
    # location /webrtc/ {
    #     proxy_pass http://clave-mediamtx:8889/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    # }

    # ── Static Asset Cache ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ──────────────────────────────────────────────────────────────
# TLS Server Block
# ──────────────────────────────────────────────────────────────
# To enable:
#   1. Replace YOUR_DOMAIN with your actual domain
#   2. Mount certs to /etc/nginx/ssl/ (Let's Encrypt or other CA)
#   3. Uncomment this entire block
#   4. Uncomment "return 301" in the HTTP block above
#
# Cert setup with Let's Encrypt:
#   certbot certonly --standalone -d YOUR_DOMAIN
#   cp /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem /etc/nginx/ssl/
#   cp /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem /etc/nginx/ssl/
