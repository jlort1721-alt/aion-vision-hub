# /etc/nginx/sites-available/aion-reverse-metrics
#
# Exposes Prometheus scrape to the metrics subnet only. Keep 127.0.0.1:9464
# (the gateway's raw metrics socket) unreachable from the public network;
# reach it through this nginx block from the Prometheus server only.
#
# Symlink to sites-enabled and `nginx -t && systemctl reload nginx`.

server {
    listen 10.0.42.53:9464;          # internal ENI address for metrics
    server_name _;

    access_log /var/log/nginx/reverse-metrics.access.log;
    error_log  /var/log/nginx/reverse-metrics.error.log warn;

    # Allow Prometheus + the Grafana box only.
    allow 10.0.42.0/24;
    deny  all;

    location /metrics {
        proxy_pass         http://127.0.0.1:9464/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    location /health {
        proxy_pass http://127.0.0.1:9464/health;
    }

    location / { return 404; }
}
