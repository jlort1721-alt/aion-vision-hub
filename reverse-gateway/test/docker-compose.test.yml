# test/docker-compose.test.yml
#
# Stack completo para correr los tests de integración, E2E y load en local
# o en CI. Levanta: Postgres aislado, Redis, go2rtc, el gateway (stub),
# la API Fastify, el frontend Vite y 50 simuladores Dahua + 50 Hikvision.

version: '3.9'

networks:
  aion-test:
    driver: bridge

volumes:
  pg-test-data:
  go2rtc-test-data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aion_test
      POSTGRES_USER: aion
      POSTGRES_PASSWORD: aion
    ports: ["55432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aion"]
      interval: 3s
      timeout: 2s
      retries: 20
    volumes:
      - pg-test-data:/var/lib/postgresql/data
      - ../reverse-gateway/migrations:/docker-entrypoint-initdb.d:ro
    networks: [aion-test]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no --save ""
    ports: ["56379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20
    networks: [aion-test]

  go2rtc:
    image: alexxit/go2rtc:latest
    ports: ["11984:1984", "18554:8554"]
    volumes: [go2rtc-test-data:/config]
    networks: [aion-test]

  gateway:
    build:
      context: ../reverse-gateway
      dockerfile: Dockerfile
      args:
        BUILD_SDKS: "0"   # stub build for CI
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      go2rtc:   { condition: service_started }
    environment:
      AION_RG_ENV: test
      AION_RG_PG_DSN: "postgres://aion:aion@postgres:5432/aion_test?sslmode=disable"
      AION_RG_REDIS_ADDR: "redis:6379"
      AION_RG_REDIS_DB: "3"
      AION_RG_GO2RTC_URL: "http://go2rtc:1984"
      AION_RG_KEY_FILE: "/etc/aion/reverse/kek.key"
    volumes:
      - ./fixtures/kek.key:/etc/aion/reverse/kek.key:ro
      - ./fixtures/gateway.toml:/etc/aion/reverse/gateway.toml:ro
    ports:
      - "7660:7660"
      - "7661:7661/tcp"
      - "7661:7661/udp"
      - "7681:7681"
      - "59464:9464"
    networks: [aion-test]

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      gateway:  { condition: service_started }
      postgres: { condition: service_healthy }
    environment:
      AION_PG_DSN: "postgres://aion:aion@postgres:5432/aion_test"
      REDIS_URL:   "redis://redis:6379/3"
      AION_RG_GRPC_ADDR: "gateway:50551"
    ports: ["13000:3000"]
    networks: [aion-test]

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    depends_on: [api]
    environment:
      VITE_API_URL: "http://localhost:13000"
    ports: ["15173:80"]
    networks: [aion-test]

  # 50 Dahua simulators
  sim-dahua:
    build:
      context: ../reverse-gateway
      dockerfile: test/sim/dahua_xvr/Dockerfile
    depends_on: [gateway]
    environment:
      SERVER: "gateway:7681"
    deploy:
      mode: replicated
      replicas: 50
    networks: [aion-test]

  # 50 Hikvision simulators
  sim-hik:
    build:
      context: ../reverse-gateway
      dockerfile: test/sim/hikvision_nvr/Dockerfile
    depends_on: [gateway]
    environment:
      SIG:    "gateway:7660"
      STREAM: "gateway:7661"
    deploy:
      mode: replicated
      replicas: 50
    networks: [aion-test]
