# Logrotate para OpenClaw — instalar con:
# sudo cp logrotate-openclaw.conf /etc/logrotate.d/openclaw
# sudo logrotate -f /etc/logrotate.d/openclaw  # test

/home/openclaw/.openclaw/*.log
/home/openclaw/.openclaw/cron-*.log
/home/openclaw/.openclaw/health-alerts.log
{
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 640 openclaw openclaw
    dateext
    dateformat -%Y%m%d
    maxsize 50M
}
