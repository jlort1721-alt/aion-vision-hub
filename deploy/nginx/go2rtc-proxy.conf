# go2rtc reverse proxy — add to the aionseg.co server block
# Include this in /etc/nginx/sites-available/aionseg.co
#
# Usage:
#   1. Copy this file to /etc/nginx/snippets/go2rtc-proxy.conf
#   2. Inside the aionseg.co server block add:
#        include snippets/go2rtc-proxy.conf;
#   3. Test and reload:
#        sudo nginx -t && sudo systemctl reload nginx

location /go2rtc/ {
    proxy_pass http://127.0.0.1:1984/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
