# ──────────────────────────────────────────────────────────────
# AION Hikvision Bridge — Nginx Internal Proxy
# Add this to the main Nginx server block on the VPS
# ──────────────────────────────────────────────────────────────

# Internal-only proxy to hik-bridge Python microservice (port 8100)
# Access via: http://localhost/hik-bridge-internal/
# NOT exposed to public — only accessible from localhost (AION Fastify)

location /hik-bridge-internal/ {
    proxy_pass http://127.0.0.1:8100/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Longer timeouts for recording downloads and SADP scans
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Large body for recording file downloads
    client_max_body_size 500M;

    # Internal access only — block external requests
    allow 127.0.0.1;
    allow ::1;
    deny all;
}

# Serve snapshots directly from disk (optional, bypass Python for static files)
location /hik-snapshots/ {
    alias /opt/aion/hik-bridge/snapshots/;
    autoindex off;
    expires 1h;
    add_header Cache-Control "public, no-transform";

    # Internal access only
    allow 127.0.0.1;
    allow ::1;
    deny all;
}
