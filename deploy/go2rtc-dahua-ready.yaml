# ══════════════════════════════════════════════════════════════
# DAHUA XVR — 11 sedes, 88 canales (8 canales × 11 XVR)
# REQUIERE: port forward del puerto 554 (RTSP) en el router de cada sede
# Formato: rtsp://user:pass@IP_PUBLICA:PUERTO/cam/realmonitor?channel=N&subtype=1
# subtype=0 = mainstream, subtype=1 = substream
#
# INSTRUCCIONES PARA EL TÉCNICO:
# En cada router de sede Dahua, crear port forward:
#   Puerto externo: 554 (o el que elijan)
#   Puerto interno: 554
#   IP interna: IP del XVR en la LAN (típicamente 192.168.1.108 o similar)
#   Protocolo: TCP
#
# Una vez configurado, reemplazar [IP_PUBLICA] y [PUERTO_RTSP] con los datos reales
# ══════════════════════════════════════════════════════════════

# NOTA: Estas entradas están COMENTADAS hasta que se configure el port forward.
# Descomentar y ajustar IP/puerto cuando el técnico complete la configuración.

