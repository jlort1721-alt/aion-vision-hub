# /etc/prometheus/targets/authed.yml
# 64 protected URLs probed with QA bot bearer token (configured in blackbox.yml).
# These are grouped so we can alert on whole-section outages.

# --- Video & Monitoring (8) ---
- targets:
    - https://aionseg.co/dashboard
    - https://aionseg.co/live-view
    - https://aionseg.co/vision-hub
    - https://aionseg.co/reverse
    - https://aionseg.co/playback
    - https://aionseg.co/camera-health
    - https://aionseg.co/wall/1
    - https://aionseg.co/tv
  labels: { group: video, severity: critical }

# --- Events & Security (5) ---
- targets:
    - https://aionseg.co/events
    - https://aionseg.co/incidents
    - https://aionseg.co/alerts
    - https://aionseg.co/detections
    - https://aionseg.co/emergency
  labels: { group: events, severity: critical }

# --- Devices & Sites (4) ---
- targets:
    - https://aionseg.co/devices
    - https://aionseg.co/sites
    - https://aionseg.co/domotics
    - https://aionseg.co/network
  labels: { group: devices, severity: high }

# --- Access Control (2) ---
- targets:
    - https://aionseg.co/access-control
    - https://aionseg.co/visitors
  labels: { group: access, severity: critical }

# --- Communications (6) ---
