    - https://aionseg.co/paging
    - https://aionseg.co/phone
    - https://aionseg.co/call-log
    - https://aionseg.co/whatsapp
    - https://aionseg.co/communications
  labels: { group: comms, severity: high }

# --- Operations (5) ---
