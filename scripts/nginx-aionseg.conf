# ═══════════════════════════════════════════════════════════
# AION Vision Hub — Nginx Configuration (aionseg.co)
# Domain-based routing with SSL (Let's Encrypt / Certbot)
# ═══════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

server_tokens off;

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    server_name aionseg.co www.aionseg.co api.aionseg.co gw.aionseg.co;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend (aionseg.co) ─────────────────────────────────
server {
    listen 443 ssl http2;
    server_name aionseg.co www.aionseg.co;

    ssl_certificate /etc/letsencrypt/live/aionseg.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aionseg.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    root /opt/aion/app/dist;
    index index.html;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip Compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml application/manifest+json;

    # ── Static Assets — 1 year cache ─────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Service Worker — never cache ─────────────────────
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Workbox — never cache ────────────────────────────
    location ~* ^/workbox-.*\.js$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── PWA Manifest ─────────────────────────────────────
    location = /manifest.webmanifest {
        expires 1d;
        add_header Cache-Control "public";
        types { application/manifest+json webmanifest; }
        try_files $uri =404;
    }

    # ── PWA Icons ────────────────────────────────────────
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Block common attack paths ────────────────────────
    location ~ /\. { deny all; }
    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) { return 444; }

    # ── SPA Fallback ─────────────────────────────────────
    location / {
        limit_req zone=general burst=100 nodelay;
        try_files $uri $uri/ /index.html;
    }

    access_log /opt/aion/logs/nginx-access.log;
    error_log /opt/aion/logs/nginx-error.log;
}

# ── API Backend (api.aionseg.co) ───────────────────────────
server {
    listen 443 ssl http2;
    server_name api.aionseg.co;

    ssl_certificate /etc/letsencrypt/live/aionseg.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aionseg.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security Headers ──────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Auth endpoints — stricter rate limit ──────────────
    location /auth/ {
        limit_req zone=login burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── API Proxy ─────────────────────────────────────────
    location / {
        limit_req zone=api burst=60 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    # ── Block common attack paths ────────────────────────
    location ~ /\. { deny all; }

    access_log /opt/aion/logs/nginx-api-access.log;
    error_log /opt/aion/logs/nginx-api-error.log;
}

# ── Edge Gateway (gw.aionseg.co) ──────────────────────────
server {
    listen 443 ssl http2;
    server_name gw.aionseg.co;

    ssl_certificate /etc/letsencrypt/live/aionseg.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aionseg.co/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Gateway Proxy ─────────────────────────────────────
    location / {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    access_log /opt/aion/logs/nginx-gw-access.log;
    error_log /opt/aion/logs/nginx-gw-error.log;
}
