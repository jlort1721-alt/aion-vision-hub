# ═══════════════════════════════════════════════════════════
# AION Vision Hub — Nginx Configuration (aionseg.co)
# Domain-based routing with SSL (Cloudflare Proxy + Origin SSL)
# CDN-ready with Brotli/Gzip compression and cache headers
# ═══════════════════════════════════════════════════════════

# ── Upstream: Backend API with keepalive ─────────────────
upstream backend_api {
    server 127.0.0.1:3000;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ── Upstream: Edge Gateway with keepalive ────────────────
upstream edge_gateway {
    server 127.0.0.1:3100;
    keepalive 16;
    keepalive_requests 500;
    keepalive_timeout 60s;
}

# ── Proxy Cache (for CDN origin-pull) ────────────────────
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
                 max_size=100m inactive=10m use_temp_path=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

server_tokens off;

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    server_name aionseg.co www.aionseg.co api.aionseg.co gw.aionseg.co;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend (aionseg.co) ─────────────────────────────────
server {
    listen 443 ssl http2;
    server_name aionseg.co www.aionseg.co;

    ssl_certificate /etc/ssl/certs/aionseg.co.crt;
    ssl_certificate_key /etc/ssl/private/aionseg.co.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Trust Cloudflare proxy IPs
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    root /opt/aion/app/dist;
    index index.html;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Vary "Accept-Encoding" always;

    # ── Brotli Compression (with gzip fallback) ───────────
    # Brotli (requires ngx_brotli module)
    brotli on;
    brotli_comp_level 6;
    brotli_min_length 256;
    brotli_types text/plain text/css text/xml application/json application/javascript
                 application/xml+rss image/svg+xml application/manifest+json
                 application/x-javascript text/javascript application/wasm;

    # Gzip fallback for clients without Brotli support
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss image/svg+xml application/manifest+json
               application/x-javascript text/javascript application/wasm;

    # ── Static Assets — CDN-optimized caching ─────────────
    # JS, CSS, fonts: immutable, 1 year (hashed filenames)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # Fonts
    location ~* \.(woff2?|ttf|eot|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "Accept-Encoding" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # Images
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # ── HTML — always revalidate with CDN ──────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # ── Service Worker — never cache ─────────────────────
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Workbox — never cache ────────────────────────────
    location ~* ^/workbox-.*\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # ── PWA Manifest ─────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400" always;
        add_header Vary "Accept-Encoding" always;
        types { application/manifest+json webmanifest; }
        try_files $uri =404;
    }

    # ── PWA Icons ────────────────────────────────────────
    location /icons/ {
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # ── Block common attack paths ────────────────────────
    location ~ /\. { deny all; }
    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|admin\.php) { return 444; }

    # ── SPA Fallback (HTML — always revalidate) ──────────
    location / {
        limit_req zone=general burst=100 nodelay;
        add_header Cache-Control "no-cache" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri $uri/ /index.html;
    }

    access_log /opt/aion/logs/nginx-access.log;
    error_log /opt/aion/logs/nginx-error.log;
}

# ── API Backend (api.aionseg.co) ───────────────────────────
server {
    listen 443 ssl http2;
    server_name api.aionseg.co;

    ssl_certificate /etc/ssl/certs/aionseg.co.crt;
    ssl_certificate_key /etc/ssl/private/aionseg.co.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security Headers ──────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Vary "Accept-Encoding" always;

    # ── Brotli Compression ────────────────────────────────
    brotli on;
    brotli_comp_level 4;
    brotli_min_length 256;
    brotli_types text/plain text/css application/json application/javascript
                 application/xml text/xml;

    # ── Gzip Fallback ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml;

    # ── Auth endpoints — stricter rate limit ──────────────
    location /auth/ {
        limit_req zone=login burst=10 nodelay;
        add_header Cache-Control "no-store, private" always;
        add_header Vary "Accept-Encoding" always;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── WebSocket endpoint ────────────────────────────────
    location /ws {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # ── API Proxy ─────────────────────────────────────────
    location / {
        limit_req zone=api burst=60 nodelay;
        add_header Cache-Control "no-store, private" always;
        add_header Vary "Accept-Encoding" always;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_cache api_cache;
        proxy_cache_bypass $http_authorization $http_cookie;
        proxy_no_cache $http_authorization $http_cookie;
        proxy_cache_valid 200 1m;
        proxy_cache_methods GET HEAD;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    # ── Block common attack paths ────────────────────────
    location ~ /\. { deny all; }

    access_log /opt/aion/logs/nginx-api-access.log;
    error_log /opt/aion/logs/nginx-api-error.log;
}

# ── Edge Gateway (gw.aionseg.co) ──────────────────────────
server {
    listen 443 ssl http2;
    server_name gw.aionseg.co;

    ssl_certificate /etc/ssl/certs/aionseg.co.crt;
    ssl_certificate_key /etc/ssl/private/aionseg.co.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security Headers ──────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Vary "Accept-Encoding" always;

    # ── Gateway Proxy ─────────────────────────────────────
    location / {
        limit_req zone=api burst=40 nodelay;
        add_header Cache-Control "no-store, private" always;

        proxy_pass http://edge_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    access_log /opt/aion/logs/nginx-gw-access.log;
    error_log /opt/aion/logs/nginx-gw-error.log;
}
