# ═══════════════════════════════════════════════════════════
# AION Vision Hub — Nginx Configuration
# Replace DOMAIN with your actual domain
# ═══════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

# Upstream backends
upstream backend_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream edge_gateway {
    server 127.0.0.1:3100;
    keepalive 16;
}

# ── Frontend: app.DOMAIN ─────────────────────────────────
server {
    listen 80;
    server_name DOMAIN;

    root /opt/aion/app/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Static assets — cache 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker — never cache
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Manifest
    location = /manifest.webmanifest {
        expires 1d;
        add_header Cache-Control "public";
        types { application/manifest+json webmanifest; }
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        limit_req zone=general burst=100 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Logs
    access_log /opt/aion/logs/nginx-frontend-access.log;
    error_log /opt/aion/logs/nginx-frontend-error.log;
}

# ── Backend API: api.DOMAIN ──────────────────────────────
server {
    listen 80;
    server_name api.DOMAIN;

    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health endpoint — no rate limit
    location /health {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Webhooks — separate rate limit
    location /webhooks/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # API routes
    location / {
        limit_req zone=api burst=60 nodelay;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logs
    access_log /opt/aion/logs/nginx-api-access.log;
    error_log /opt/aion/logs/nginx-api-error.log;
}

# ── Edge Gateway: gw.DOMAIN ─────────────────────────────
server {
    listen 80;
    server_name gw.DOMAIN;

    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Health
    location /health {
        proxy_pass http://edge_gateway;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Gateway routes
    location / {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://edge_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Logs
    access_log /opt/aion/logs/nginx-gateway-access.log;
    error_log /opt/aion/logs/nginx-gateway-error.log;
}

# ── Global: Hide Nginx version ───────────────────────────
server_tokens off;
