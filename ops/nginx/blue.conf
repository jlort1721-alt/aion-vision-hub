# /etc/nginx/aion-upstreams/blue.conf
# ACTIVATED BY symlinking to /etc/nginx/conf.d/aion-upstream.conf
# Reload nginx after symlink change: nginx -s reload

upstream aion_api {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
    keepalive_timeout 60s;
}

upstream aion_frontend {
    least_conn;
    server 127.0.0.1:3100 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream aion_agent {
    server 127.0.0.1:3200 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream aion_model_router {
    server 127.0.0.1:8787 max_fails=3 fail_timeout=10s;
    keepalive 8;
}

upstream aion_vision_hub {
    server 127.0.0.1:3030 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream aion_comms {
    server 127.0.0.1:3300 max_fails=3 fail_timeout=10s;
    keepalive 8;
}
