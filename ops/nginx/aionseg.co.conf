# /etc/nginx/sites-available/aionseg.co
# Enable: ln -sfn /etc/nginx/sites-available/aionseg.co /etc/nginx/sites-enabled/aionseg.co
# Upstreams come from /etc/nginx/conf.d/aion-upstream.conf (symlinked to blue.conf or green.conf)

# ---- Rate limiting zones -----------------------------------------------------
limit_req_zone $binary_remote_addr zone=aion_api:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=aion_login:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=aion_agent:10m  rate=10r/s;

# ---- HTTP -> HTTPS redirect --------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name aionseg.co www.aionseg.co;

    # Let's Encrypt renewal
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://aionseg.co$request_uri; }
}

# ---- HTTPS: www -> apex ------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.aionseg.co;

    ssl_certificate     /etc/letsencrypt/live/aionseg.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aionseg.co/privkey.pem;
    return 301 https://aionseg.co$request_uri;
}

# ---- HTTPS: main site --------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aionseg.co;

    # --- TLS ---
    ssl_certificate           /etc/letsencrypt/live/aionseg.co/fullchain.pem;
    ssl_certificate_key       /etc/letsencrypt/live/aionseg.co/privkey.pem;
    ssl_trusted_certificate   /etc/letsencrypt/live/aionseg.co/chain.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:20m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(self), microphone=(self), geolocation=(self)" always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https: blob:; media-src 'self' blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://aionseg.co wss://aionseg.co https://api.anthropic.com https://*.twilio.com; frame-ancestors 'self'" always;

    # --- Basics ---
    client_max_body_size 200M;
    client_body_timeout  120s;
    keepalive_timeout    75s;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    access_log /var/log/nginx/aionseg.co.access.log combined buffer=32k flush=5s;
    error_log  /var/log/nginx/aionseg.co.error.log warn;

    # --- Login (extra rate limit) ---
    location = /login {
        limit_req zone=aion_login burst=10 nodelay;
        proxy_pass http://aion_frontend;
        include /etc/nginx/snippets/aion-proxy.conf;
    }
    location = /api/auth/login {
        limit_req zone=aion_login burst=10 nodelay;
        proxy_pass http://aion_api;
        include /etc/nginx/snippets/aion-proxy.conf;
    }

    # --- Agent streaming (SSE) ---
    location /api/agent/ {
        limit_req zone=aion_agent burst=30 nodelay;
        proxy_pass http://aion_agent;
        include /etc/nginx/snippets/aion-proxy.conf;
        proxy_buffering     off;
        proxy_read_timeout  600s;
        proxy_set_header    X-Accel-Buffering no;
    }

    # --- Vision Hub (HLS/WS/WebRTC via go2rtc) ---
    location /api/vision-hub/ {
        proxy_pass http://aion_vision_hub;
        include /etc/nginx/snippets/aion-proxy.conf;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # --- Model router (internal-only in prod, but available here for debug) ---
    location /api/model-router/ {
        proxy_pass http://aion_model_router;
        include /etc/nginx/snippets/aion-proxy.conf;
        allow 127.0.0.1;
        deny  all;
    }

    # --- Comms (Twilio webhooks, Asterisk HTTP bridge) ---
    location /api/twilio/ {
        proxy_pass http://aion_comms;
        include /etc/nginx/snippets/aion-proxy.conf;
    }
    location /api/asterisk/ {
        proxy_pass http://aion_comms;
        include /etc/nginx/snippets/aion-proxy.conf;
    }

    # --- General API ---
    location /api/ {
        limit_req zone=aion_api burst=60 nodelay;
        proxy_pass http://aion_api;
        include /etc/nginx/snippets/aion-proxy.conf;
    }

    # --- WebSockets ---
    location /ws/ {
        proxy_pass http://aion_api;
        include /etc/nginx/snippets/aion-proxy.conf;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # --- Static Next.js assets ---
    location /_next/static/ {
        proxy_pass http://aion_frontend;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Catch-all: frontend SSR ---
    location / {
        proxy_pass http://aion_frontend;
        include /etc/nginx/snippets/aion-proxy.conf;
    }
}
