# /etc/nginx/aion-upstreams/green.conf
# Green uses port+1 for each service (see ecosystem.config.js)

upstream aion_api {
    least_conn;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    keepalive 64;
    keepalive_timeout 60s;
}

upstream aion_frontend {
    least_conn;
    server 127.0.0.1:3101 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream aion_agent {
    server 127.0.0.1:3201 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream aion_model_router {
    server 127.0.0.1:8788 max_fails=3 fail_timeout=10s;
    keepalive 8;
}

upstream aion_vision_hub {
    server 127.0.0.1:3031 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream aion_comms {
    server 127.0.0.1:3301 max_fails=3 fail_timeout=10s;
    keepalive 8;
}
