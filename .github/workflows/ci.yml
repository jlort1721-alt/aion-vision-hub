name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "release/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  code-quality-and-tests:
    name: Backend & Frontend Type/Scan Quality
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Code Repository (Snapshot Retrieval)
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Install pnpm / Node Environment
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Enterprise Dependency Resolution (Project Root)
      run: npm ci

    - name: Deep Build Analysis (Frontend Vite Compilation)
      run: npm run build

    - name: Fastify Backend Tests (Vitest Engine)
      run: |
        cd backend/apps/backend-api
        npm ci
        npm run test

    - name: Deep Type Scanning (Zero Fallback)
      run: |
        npx tsc --noEmit
        cd backend/apps/backend-api
        npx tsc --noEmit

  # Later deployment module for AWS/Docker/Edge Nodes
  # deployment-matrix:
  #   needs: [code-quality-and-tests]
  #   ...
