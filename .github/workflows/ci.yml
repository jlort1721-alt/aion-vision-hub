# =============================================================================
# AION Vision Hub — CI Pipeline
# =============================================================================
# Runs on every push to main and on every pull request.
# Three workspace jobs (frontend, backend, gateway) execute in parallel.
# A final "quality-gate" job enforces that ALL checks pass before merge.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ---------------------------------------------------------------------------
# Frontend — React / Vite (root package.json, npm)
# ---------------------------------------------------------------------------
jobs:
  frontend:
    name: "Frontend · lint → typecheck → test → build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ---------------------------------------------------------------------------
  # Backend — pnpm monorepo with Turborepo
  # ---------------------------------------------------------------------------
  backend:
    name: "Backend · lint → typecheck → test → build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: backend/.turbo
          key: turbo-backend-${{ runner.os }}-${{ hashFiles('backend/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-backend-${{ runner.os }}-${{ hashFiles('backend/pnpm-lock.yaml') }}-
            turbo-backend-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Security audit
        run: pnpm audit --audit-level high || true

  # ---------------------------------------------------------------------------
  # Gateway — standalone Node service (npm)
  # ---------------------------------------------------------------------------
  gateway:
    name: "Gateway · lint → typecheck → test → build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high || true

  # ---------------------------------------------------------------------------
  # Docker — validate that all images build correctly
  # ---------------------------------------------------------------------------
  docker-validate:
    name: "Docker · validate builds"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    needs: [backend, gateway]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend-api image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/apps/backend-api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: aion/backend-api:ci

      - name: Build edge-gateway image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/apps/edge-gateway/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: aion/edge-gateway:ci

      - name: Build standalone gateway image (no push)
        uses: docker/build-push-action@v6
        with:
          context: gateway
          file: gateway/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: aion/gateway:ci

  # ---------------------------------------------------------------------------
  # Quality Gate — all jobs must pass before a PR can be merged
  # ---------------------------------------------------------------------------
  quality-gate:
    name: "Quality Gate"
    if: always()
    needs: [frontend, backend, gateway, docker-validate]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          echo "Frontend:        ${{ needs.frontend.result }}"
          echo "Backend:         ${{ needs.backend.result }}"
          echo "Gateway:         ${{ needs.gateway.result }}"
          echo "Docker Validate: ${{ needs.docker-validate.result }}"

          FAILED=false

          for result in \
            "${{ needs.frontend.result }}" \
            "${{ needs.backend.result }}" \
            "${{ needs.gateway.result }}"; do
            if [[ "$result" != "success" ]]; then
              FAILED=true
            fi
          done

          # Docker validate can be skipped on non-main branches
          if [[ "${{ needs.docker-validate.result }}" == "failure" ]]; then
            FAILED=true
          fi

          if $FAILED; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi

          echo "All checks passed — ready to merge."
