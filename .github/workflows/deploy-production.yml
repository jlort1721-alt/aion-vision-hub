# =============================================================================
# AION Vision Hub — Deploy to Production
# =============================================================================
# Triggered when a release is published (v* tag).
# Builds production Docker images, pushes to GHCR, and deploys
# with a manual approval gate.
# =============================================================================

name: Deploy → Production

on:
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a production deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aion

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — run full test suite before production deploy
  # ---------------------------------------------------------------------------
  preflight:
    name: "Preflight checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Frontend — install & test
        run: npm ci && npm test && npx tsc -b

      # Backend
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Backend — install & test
        working-directory: backend
        run: pnpm install --frozen-lockfile && pnpm test && pnpm typecheck

      # Edge Gateway (part of backend monorepo)
      # Covered by backend pnpm test & typecheck above

  # ---------------------------------------------------------------------------
  # Build & Push — production Docker images
  # ---------------------------------------------------------------------------
  build-push:
    name: "Build & push ${{ matrix.image }}"
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: backend-api
            context: backend
            dockerfile: backend/apps/backend-api/Dockerfile
          - image: edge-gateway
            context: backend
            dockerfile: backend/apps/edge-gateway/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-prod
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-prod

  # ---------------------------------------------------------------------------
  # Build Frontend — production static assets
  # ---------------------------------------------------------------------------
  build-frontend:
    name: "Build frontend for production"
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with production env
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL || 'https://app.yourdomain.com/api' }}
          VITE_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-production-${{ github.event.release.tag_name }}
          path: dist/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Deploy — production environment (requires manual approval)
  # ---------------------------------------------------------------------------
  deploy:
    name: "Deploy to production"
    runs-on: ubuntu-latest
    needs: [build-push, build-frontend]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-production-${{ github.event.release.tag_name }}
          path: dist/

      # ------------------------------------------------------------------
      # Deploy via SSH + Docker Compose to production VPS
      # The "production" environment in GitHub Settings should have
      # required reviewers and a deployment branch policy.
      # ------------------------------------------------------------------

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add production host to known_hosts
        run: ssh-keyscan -H ${{ secrets.PRODUCTION_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Login to GHCR on production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy backend services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            APP_DIR="/opt/aion/app"
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            cd "$APP_DIR/backend"

            echo "=== Production deploy: $RELEASE_TAG ==="
            echo "=== Creating pre-deploy backup marker ==="
            date -u "+%Y-%m-%dT%H:%M:%SZ deploy=$RELEASE_TAG" >> "$APP_DIR/deploy.log"

            echo "=== Pulling production images ==="
            docker compose -f docker-compose.yml --env-file .env.docker pull

            echo "=== Running database migrations ==="
            for migration in "$APP_DIR/backend/apps/backend-api/src/db/migrations"/*.sql; do
              if [ -f "$migration" ]; then
                echo "  Applying: $(basename "$migration")"
                docker compose -f docker-compose.yml --env-file .env.docker exec -T postgres \
                  psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f "/migrations/$(basename "$migration")" 2>/dev/null || \
                  echo "  (skipped or already applied)"
              fi
            done

            echo "=== Stopping services gracefully ==="
            docker compose -f docker-compose.yml --env-file .env.docker stop backend-api edge-gateway 2>/dev/null || true

            echo "=== Starting services ==="
            docker compose -f docker-compose.yml --env-file .env.docker up -d --remove-orphans

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Waiting for services to start ==="
            sleep 15

            echo "=== Health checks ==="
            PASS=0; FAIL=0
            for svc in "localhost:3000/health:API" "localhost:3100/health:Gateway" "localhost:9997/v3/paths:MediaMTX"; do
              URL=$(echo "$svc" | cut -d: -f1-2)
              NAME=$(echo "$svc" | cut -d: -f3)
              RETRIES=3
              OK=0
              for i in $(seq 1 $RETRIES); do
                if curl -sf "http://$URL" --max-time 10 >/dev/null 2>&1; then
                  OK=1
                  break
                fi
                echo "  $NAME: attempt $i/$RETRIES failed, retrying in 5s..."
                sleep 5
              done
              if [ "$OK" -eq 1 ]; then
                echo "  $NAME: OK"
                PASS=$((PASS+1))
              else
                echo "  $NAME: FAILED"
                FAIL=$((FAIL+1))
              fi
            done

            if [ "$FAIL" -gt 0 ]; then
              echo "CRITICAL: $FAIL service(s) unhealthy after production deploy"
              docker compose -f docker-compose.yml --env-file .env.docker logs --tail=50
              exit 1
            fi
            echo "All services healthy ($PASS/$((PASS+FAIL)))"
            echo "Production deploy $RELEASE_TAG complete."

      - name: Deploy frontend assets
        run: |
          rsync -azP --delete \
            dist/ \
            ${{ secrets.PRODUCTION_SSH_USER }}@${{ secrets.PRODUCTION_SSH_HOST }}:/opt/aion/app/frontend/dist/

  # ---------------------------------------------------------------------------
  # Post-deploy verification
  # ---------------------------------------------------------------------------
  verify:
    name: "Post-deploy verification"
    runs-on: ubuntu-latest
    needs: deploy
    if: vars.PRODUCTION_API_URL != ''
    steps:
      - name: Health check — backend API
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_API_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production backend API is healthy."
              exit 0
            fi
            echo "Attempt $i — status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "::error::Production backend API health check failed."
          exit 1

      - name: Health check — gateway
        if: vars.PRODUCTION_GATEWAY_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_GATEWAY_URL }}/health" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Production gateway is healthy."
          else
            echo "::warning::Production gateway returned status $STATUS"
          fi
