# =============================================================================
# AION Vision Hub — Deploy to Production
# =============================================================================
# Triggered when a release is published (v* tag).
# Builds production Docker images, pushes to GHCR, and deploys
# with a manual approval gate.
# =============================================================================

name: Deploy → Production

on:
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a production deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aion

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — run full test suite before production deploy
  # ---------------------------------------------------------------------------
  preflight:
    name: "Preflight checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Frontend — install & test
        run: npm ci && npm test && npx tsc -b

      # Backend
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Backend — install & test
        working-directory: backend
        run: pnpm install --frozen-lockfile && pnpm test && pnpm typecheck

      # Gateway
      - name: Gateway — install & test
        working-directory: gateway
        run: npm ci && npm test && npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Build & Push — production Docker images
  # ---------------------------------------------------------------------------
  build-push:
    name: "Build & push ${{ matrix.image }}"
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: backend-api
            context: backend
            dockerfile: backend/apps/backend-api/Dockerfile
          - image: edge-gateway
            context: backend
            dockerfile: backend/apps/edge-gateway/Dockerfile
          - image: gateway
            context: gateway
            dockerfile: gateway/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-prod
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-prod

  # ---------------------------------------------------------------------------
  # Build Frontend — production static assets
  # ---------------------------------------------------------------------------
  build-frontend:
    name: "Build frontend for production"
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with production env
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-production-${{ github.event.release.tag_name }}
          path: dist/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Deploy — production environment (requires manual approval)
  # ---------------------------------------------------------------------------
  deploy:
    name: "Deploy to production"
    runs-on: ubuntu-latest
    needs: [build-push, build-frontend]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-production-${{ github.event.release.tag_name }}
          path: dist/

      # ------------------------------------------------------------------
      # Configure your production deploy strategy below.
      # The "production" environment in GitHub Settings should have
      # required reviewers and a deployment branch policy.
      # ------------------------------------------------------------------

      - name: Production deploy placeholder
        run: |
          echo "============================================"
          echo "  PRODUCTION DEPLOY — ${{ github.event.release.tag_name }}"
          echo "============================================"
          echo ""
          echo "Docker images pushed to GHCR:"
          echo "  - ${{ env.IMAGE_PREFIX }}/backend-api:${{ github.event.release.tag_name }}"
          echo "  - ${{ env.IMAGE_PREFIX }}/edge-gateway:${{ github.event.release.tag_name }}"
          echo "  - ${{ env.IMAGE_PREFIX }}/gateway:${{ github.event.release.tag_name }}"
          echo ""
          echo "Frontend artifact: frontend-production-${{ github.event.release.tag_name }}"
          echo ""
          echo "Configure your deploy provider in this workflow."

  # ---------------------------------------------------------------------------
  # Post-deploy verification
  # ---------------------------------------------------------------------------
  verify:
    name: "Post-deploy verification"
    runs-on: ubuntu-latest
    needs: deploy
    if: vars.PRODUCTION_API_URL != ''
    steps:
      - name: Health check — backend API
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_API_URL }}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Production backend API is healthy."
              exit 0
            fi
            echo "Attempt $i — status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "::error::Production backend API health check failed."
          exit 1

      - name: Health check — gateway
        if: vars.PRODUCTION_GATEWAY_URL != ''
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_GATEWAY_URL }}/health" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Production gateway is healthy."
          else
            echo "::warning::Production gateway returned status $STATUS"
          fi
