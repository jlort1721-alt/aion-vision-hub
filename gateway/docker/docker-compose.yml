version: "3.9"
services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aion-net
    volumes:
      - gateway-logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # Optional: MediaMTX for RTSP → WebRTC transcoding
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"   # RTSP
      - "8889:8889"   # WebRTC
      - "8890:8890"   # SRT
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped
    networks:
      - aion-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

networks:
  aion-net:
    driver: bridge

volumes:
  gateway-logs:
